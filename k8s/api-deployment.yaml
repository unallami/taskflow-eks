apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
      - name: api-service
        image: 577327406267.dkr.ecr.us-east-1.amazonaws.com/api-service:latest
        ports:
        - containerPort: 5000
        env:
        - name: COGNITO_USER_POOL_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: cognito_user_pool_id
        - name: COGNITO_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: cognito_client_id
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api-service
  ports:
  - port: 80
    targetPort: 5000
  type: LoadBalancer